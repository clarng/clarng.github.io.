      <b style="font-size: 1.5rem;">Clarence Ng</b>
      <br>
      I work at the intersection of model training and ML systems engineering. Scaled up the first diffusion-based transformer for VideoGen. Large model distillation. Researched new architecture to improve long-context performance for real-time applications.

      <br><br>
      My other expertise is in distributed systems — fault tolerance at scale, consensus protocols, data consistency. Tons of fun (and hard) problems that are well understood at this point, with some applicable to machine learning.
